# ==========================================
#          ОСНОВНЫЕ НАСТРОЙКИ САЙТА
# ==========================================
title: "think wait fast"
description: "Заметки на полях, опыт автоматизации и просто мысли вслух."
url: "https://actxact.github.io" # Замените на ваш URL
baseurl: "" # Оставьте пустым, если сайт в корневом репозитории (username.github.io)

# Кодировка и языковые стандарты
encoding: "utf-8"
lang: "ru"
timezone: "Europe/Moscow"

# ==========================================
#          ПРОГРЕССИВНАЯ СТРУКТУРА URL
# ==========================================
# Чистые ЧПУ без расширения .html на конце. Слэш в конце создает красивую структуру папок.
permalink: /:year/:month/:day/:title/

# Настройка путей для категорий и тегов (на будущее)
category_dir: /categories/
tag_dir: /tags/

# ==========================================
#          SEO И СОЦИАЛЬНЫЕ СЕТИ
# ==========================================
# Эти данные подхватываются плагином jekyll-seo-tag для генерации OpenGraph-тегов
author:
  name: "Ваше Имя / Никнейм"
  twitter: "your_twitter"   # если есть
  github: "your-username"

# ==========================================
#  СБОРКА, ПЛАГИНЫ И ОПТИМИЗАЦИЯ
# ==========================================
# Markdown-парсер (Kramdown — самый мощный и стандартный для GitHub)
markdown: kramdown
kramdown:
  input: GFM                 # GitHub Flavored Markdown (поддержка таблиц, зачеркиваний, списков задач)
  hard_wrap: false           # Перенос строки только по двойному пробелу (стандарт Markdown)
  syntax_highlighter: rouge  # Прогрессивный подсветчик синтаксиса для блоков кода

# Подсвечивать блоки кода без лишней разметки
highlighter: rouge

# Список официальных плагинов, которые GitHub Pages поддерживает «из коробки»
plugins:
  - jekyll-seo-tag           # Авто-генерация мета-тегов для поисковиков и соцсетей
  - jekyll-sitemap           # Авто-генерация карты сайта sitemap.xml для Яндекс/Google
  - jekyll-feed              # Автоматическая генерация RSS-ленты для читалок
  - jekyll-include-cache     # Ускоряет сборку сайта за счет кэширования повторяющихся элементов

# ==========================================
#      ИСКЛЮЧЕНИЯ (ЧТО НЕ НАДО СОБИРАТЬ)
# ==========================================
# Исключаем служебные файлы, чтобы они не попадали в финальный билд сайта
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .jekyll-cache/
  - .jekyll-metadata
  - README.md
  - LICENSE
  - .gitignore

# ==========================================
#        УПРАВЛЕНИЕОТОБРАЖЕНИЕМ ПОСТОВ
# ==========================================
# Ограничение количества постов на главной странице, если решите включить пагинацию
paginate: 10
paginate_path: "/page:num/"

# Чтение времени (read time) для постов — средняя скорость чтения
# Используется в шаблонах как {{ post.content | number_of_words | divided_by: 180 }} мин.
